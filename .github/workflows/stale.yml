# Close stale issues and PRs after 60 days of inactivity
name: Stale

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has been
            inactive for 60 days. It will be closed in 14 days if no further
            activity occurs.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has been
            inactive for 60 days. It will be closed in 14 days if no further
            activity occurs.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
          close-pr-message: >
            This PR has been automatically closed due to inactivity.
