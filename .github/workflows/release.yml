name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package
        run: |
          tar czf sonata.tar.gz dist/ package.json package-lock.json
          zip -r sonata.zip dist/ package.json package-lock.json
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sonata ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            sonata.tar.gz
            sonata.zip
